<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛騰雲端 UTM 標準化生成器</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & Babel (瀏覽器端編譯 JSX 用，適合輕量部署) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 核心字典與設定 ---
        const zhToEnDict = {
            '人資': 'hr', '系統': 'system', '考勤': 'attendance', '排班': 'shift',
            '薪資': 'payroll', '打卡': 'punch', '招募': 'recruit', '測驗': 'test',
            '示範': 'demo', '導覽': 'tour', '手冊': 'guide', '指南': 'guide',
            '白皮書': 'whitepaper', '電子報': 'newsletter', '文章': 'article',
            '品牌': 'brand', '活動': 'event', '報名': 'register', '優惠': 'promo',
            '案例': 'case', '客戶': 'client', '產品': 'product', '最新': 'latest',
            '消息': 'news', '登入': 'login', '註冊': 'signup', '客服': 'support'
        };

        const sourceMediumMap = {
            meta: 'cpc', google: 'cpc', edm: 'email', facebook: 'social',
            instagram: 'social', linkedin: 'social', youtube: 'social',
            chatgpt: 'ai_referral', gemini: 'ai_referral', perplexity: 'ai_referral',
            partner: 'referral', website: 'referral', organic_search: 'organic'
        };

        function App() {
            const [originalUrl, setOriginalUrl] = useState('');
            const [source, setSource] = useState('facebook');
            const [campaignDate, setCampaignDate] = useState('');
            const [campaignTheme, setCampaignTheme] = useState('');
            const [campaignPurpose, setCampaignPurpose] = useState('lead');
            const [utmContent, setUtmContent] = useState('');
            const [utmTerm, setUtmTerm] = useState('');
            const [finalUrl, setFinalUrl] = useState('');
            const [warnings, setWarnings] = useState([]);
            const [copySuccess, setCopySuccess] = useState('');

            useEffect(() => {
                const today = new Date();
                setCampaignDate(`${today.getFullYear()}_${String(today.getMonth() + 1).padStart(2, '0')}`);
            }, []);

            const formatTheme = (text) => {
                if (!text) return '';
                let processedText = text.toLowerCase();
                for (const [zh, en] of Object.entries(zhToEnDict)) {
                    processedText = processedText.split(zh).join(`${en}_`);
                }
                processedText = processedText.replace(/[\s\-]+/g, '_').replace(/[^a-z0-9_]/g, '').replace(/_+/g, '_').replace(/^_|_$/g, '');
                return processedText;
            };

            useEffect(() => {
                let currentWarnings = [];
                let baseUrl = '';
                try {
                    if (originalUrl) {
                        baseUrl = new URL(originalUrl.startsWith('http') ? originalUrl : `https://${originalUrl}`);
                    }
                } catch (e) {
                    currentWarnings.push('請輸入有效的目標網址 (需包含 http 或 https)');
                }

                if (/[\u4e00-\u9fa5]/.test(campaignTheme)) {
                    currentWarnings.push('⚠️ 標題包含中文，系統已嘗試自動翻譯。');
                }

                const themeSlug = formatTheme(campaignTheme);
                const campaignStr = `${campaignDate}_${themeSlug}_${campaignPurpose}`.replace(/_+/g, '_').replace(/_$/, '');

                if (baseUrl && !currentWarnings.includes('請輸入有效的目標網址 (需包含 http 或 https)')) {
                    baseUrl.searchParams.set('utm_source', source);
                    baseUrl.searchParams.set('utm_medium', sourceMediumMap[source]);
                    if (themeSlug) baseUrl.searchParams.set('utm_campaign', campaignStr);
                    else currentWarnings.push('請輸入「活動主題」以構成完整的 utm_campaign');
                    if (utmContent) baseUrl.searchParams.set('utm_content', utmContent.trim().toLowerCase().replace(/\s+/g, '_'));
                    if (utmTerm && source === 'google') baseUrl.searchParams.set('utm_term', utmTerm.trim().toLowerCase().replace(/\s+/g, '_'));
                    setFinalUrl(baseUrl.toString());
                } else {
                    setFinalUrl('');
                }
                setWarnings(currentWarnings);
            }, [originalUrl, source, campaignDate, campaignTheme, campaignPurpose, utmContent, utmTerm]);

            const copyToClipboard = (text, type) => {
                if (!text) return;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopySuccess(`${type} 已複製！`);
                    setTimeout(() => setCopySuccess(''), 3000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleExternalShortener = (serviceUrl) => {
                if (!finalUrl) return;
                copyToClipboard(finalUrl, '長網址');
                setTimeout(() => { window.open(serviceUrl, '_blank'); }, 300);
            };

            return (
                <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
                    <div className="max-w-5xl mx-auto space-y-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row items-center justify-between">
                            <div>
                                <h1 className="text-2xl font-bold text-indigo-900 tracking-tight">飛騰雲端 UTM 標準化工具</h1>
                                <p className="text-sm text-gray-500 mt-1">v2.0 遵循《飛騰雲端 UTM 命名規範建議版》</p>
                            </div>
                            <div className="mt-4 md:mt-0 text-sm bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg border border-indigo-100 font-medium">
                                ✔ 自動格式化 ✔ 自動對應 Medium ✔ 禁用中文與空白
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-7 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 space-y-6">
                                <h2 className="text-lg font-semibold text-gray-900 border-b pb-2">設定來源參數</h2>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">1. 目標網址 <span className="text-red-500">*</span></label>
                                    <input type="url" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="https://www.scshr.com/..." value={originalUrl} onChange={(e) => setOriginalUrl(e.target.value)} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">2. 來源平台 <span className="text-red-500">*</span></label>
                                        <select className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 bg-white" value={source} onChange={(e) => setSource(e.target.value)}>
                                            <optgroup label="社群平台"><option value="facebook">facebook</option><option value="instagram">instagram</option><option value="linkedin">linkedin</option><option value="youtube">youtube</option></optgroup>
                                            <optgroup label="廣告/EDM"><option value="meta">meta (廣告)</option><option value="google">google (廣告)</option><option value="edm">edm (電子報)</option></optgroup>
                                            <optgroup label="AI 平台"><option value="chatgpt">chatgpt</option><option value="gemini">gemini</option><option value="perplexity">perplexity</option></optgroup>
                                            <optgroup label="其他與自有渠道"><option value="website">website (官網)</option><option value="partner">partner (合作外站)</option></optgroup>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">媒介類型 <span className="text-gray-400 text-xs">系統自動判斷</span></label>
                                        <input type="text" disabled className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-500 font-mono" value={sourceMediumMap[source]} />
                                    </div>
                                </div>
                                <div className="space-y-4 pt-2">
                                    <label className="block text-sm font-medium text-gray-700">3. 活動命名 <span className="text-red-500">*</span></label>
                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 grid grid-cols-1 md:grid-cols-3 gap-3">
                                        <div><label className="block text-xs text-gray-500 mb-1">年份_月份</label><input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-md text-sm font-mono" value={campaignDate} onChange={(e) => setCampaignDate(e.target.value)} /></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">主題 (自動轉英)</label><input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-md text-sm" value={campaignTheme} onChange={(e) => setCampaignTheme(e.target.value)} /></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">目的</label><select className="w-full px-3 py-2 border border-gray-300 rounded-md text-sm bg-white" value={campaignPurpose} onChange={(e) => setCampaignPurpose(e.target.value)}><option value="lead">名單收集 (lead)</option><option value="engagement">互動/瀏覽 (engagement)</option><option value="awareness">品牌曝光 (awareness)</option><option value="conversion">轉換/購買 (conversion)</option></select></div>
                                    </div>
                                </div>
                                <div className="pt-2 border-t mt-4 border-gray-100">
                                    <label className="block text-sm font-medium text-gray-700 mb-3">4. 進階選填</label>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div><label className="block text-xs text-gray-500 mb-1">素材/版位 (utm_content)</label><input type="text" className="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm" placeholder="例如: banner_top" value={utmContent} onChange={(e) => setUtmContent(e.target.value)} /></div>
                                        <div><label className="block text-xs text-gray-500 mb-1">關鍵字 (utm_term)</label><input type="text" className="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm disabled:bg-gray-100" placeholder="例如: hr_system" value={utmTerm} disabled={source !== 'google'} onChange={(e) => setUtmTerm(e.target.value)} /></div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-5 flex flex-col space-y-6">
                                {warnings.length > 0 && (
                                    <div className="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg shadow-sm">
                                        <h3 className="text-sm font-medium text-amber-800">狀態提醒</h3>
                                        <ul className="mt-2 text-sm text-amber-700 list-disc pl-5">{warnings.map((w, i) => <li key={i}>{w}</li>)}</ul>
                                    </div>
                                )}
                                <div className="bg-indigo-900 rounded-2xl shadow-lg p-6 text-white flex-1 flex flex-col">
                                    <h2 className="text-lg font-semibold border-b border-indigo-700 pb-2 mb-4">產出結果</h2>
                                    <div className="flex-1 space-y-6">
                                        <div>
                                            <label className="block text-sm font-medium text-indigo-200 mb-2">完整追蹤網址</label>
                                            <div className="relative"><textarea readOnly className="w-full h-32 px-4 py-3 bg-indigo-950 border border-indigo-800 rounded-xl text-indigo-50 font-mono text-sm resize-none outline-none" value={finalUrl || '等待輸入...'} /><button onClick={() => copyToClipboard(finalUrl, '網址')} disabled={!finalUrl} className="absolute bottom-3 right-3 bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg text-sm transition-colors">複製長網址</button></div>
                                        </div>
                                        <div className="bg-indigo-800 rounded-xl p-4 border border-indigo-700 space-y-3">
                                            <label className="block text-sm font-medium text-indigo-200">轉換免費短網址 (無廣告)</label>
                                            <div className="flex flex-col md:flex-row gap-3">
                                                <button onClick={() => handleExternalShortener('https://ppt.cc/')} disabled={!finalUrl} className="flex-1 bg-indigo-50 text-indigo-900 hover:bg-white px-4 py-2.5 rounded-lg font-semibold text-sm transition-colors">前往 ppt.cc</button>
                                                <button onClick={() => handleExternalShortener('https://is.gd/')} disabled={!finalUrl} className="flex-1 bg-indigo-900 border border-indigo-600 text-indigo-100 hover:bg-indigo-700 px-4 py-2.5 rounded-lg font-semibold text-sm transition-colors">前往 is.gd</button>
                                            </div>
                                            <p className="text-xs text-indigo-300 text-center italic">點擊將自動複製長網址並跳轉</p>
                                        </div>
                                    </div>
                                    {copySuccess && <div className="mt-4 text-center text-sm text-emerald-400 bg-emerald-900/30 py-2 rounded-lg border border-emerald-800/50">{copySuccess}</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
